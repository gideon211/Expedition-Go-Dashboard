name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ───────────── Stage 1: Gate (blocks deploy) ─────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit & Middleware Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-master
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      DIRECT_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run unit & middleware tests
        run: npm test

  test-e2e:
    name: E2E Tests
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-master
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      DIRECT_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npm run test:e2e

  # ───────────── Stage 2: Advisory (doesn't block deploy) ─────────────
  test-concurrency:
    name: Concurrency Tests
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgis/postgis:16-master
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      DIRECT_URL: postgresql://test:test@localhost:5432/testdb

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Run concurrency tests
        run: npm run test:concurrency

  # ───────────── Stage 3: Deploy to Render ─────────────
  deploy:
    name: Deploy to Render
    needs: [test, test-e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ───────────── Stage 4: Post-deploy health check ─────────────
  health-check:
    name: Post-deploy Health Check
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for deploy and verify health endpoint
        run: |
          URL="${{ secrets.RENDER_APP_URL }}/health"
          for i in $(seq 1 48); do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "✅ Deploy is live and healthy"
              exit 0
            fi
            echo "Waiting for deploy... attempt $i/48"
            sleep 10
          done
          echo "❌ Deploy did not become healthy within 8 minutes"
          exit 1
